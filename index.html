<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Etat – Suivi des services</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'tajawal': ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        accent: {
                            500: '#14b8a6',
                            600: '#0d9488',
                        },
                        sidebar: '#0f172a',
                    }
                }
            }
        }
    </script>

    <!-- Tajawal Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-100 text-slate-800 font-tajawal">

    <!-- ========== PUBLIC CONSULTANT PAGE (DEFAULT) ========== -->
    <div id="publicPage" class="min-h-screen p-4 md:p-8 bg-gradient-to-br from-slate-50 to-slate-100">
        <div class="max-w-6xl mx-auto">
            <header class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-primary-500 rounded-2xl flex items-center justify-center shadow-lg shadow-primary-500/30">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800">Services Etat</h1>
                        <p class="text-slate-500 text-sm">État des services en temps réel</p>
                    </div>
                </div>
                <button id="showLoginBtn" class="px-6 py-3 bg-primary-500 hover:bg-primary-600 text-white rounded-xl font-semibold transition-all shadow-md shadow-primary-500/20 active:scale-95">
                    🔐 Accès Employé
                </button>
            </header>

            <div id="publicConsultantView">
                <!-- Rempli dynamiquement par JS -->
            </div>
        </div>
    </div>

    <!-- ========== LOGIN SCREEN (HIDDEN) ========== -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-800 via-slate-900 to-slate-800 p-4 hidden">
        <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Services Etat</h1>
                <p class="text-slate-500 text-sm mt-1">Connexion employé</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-400 outline-none">
                </div>
                <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 rounded-xl transition-all shadow-lg">
                    Se connecter
                </button>
            </form>
            <button id="backToPublicBtn" class="mt-4 text-sm text-primary-600 hover:text-primary-800 w-full text-center">← Retour à l'état des services</button>
            <div class="mt-6 p-4 bg-slate-50 rounded-xl">
                <p class="text-xs font-medium text-slate-500 mb-2">Identifiants de démonstration :</p>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div>admin@lab.com / admin123</div>
                    <div>lab@lab.com / lab123</div>
                    <div>rx@lab.com / rx123</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== APPLICATION EMPLOYÉE (HIDDEN) ========== -->
    <div id="appContainer" class="hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar sidebar-mobile-hidden">
            <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-700/50">
                <div class="w-10 h-10 bg-primary-500 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-white font-bold text-sm">Services Etat</h2>
                    <p id="sidebarRole" class="text-slate-400 text-xs">Rôle</p>
                </div>
            </div>
            <nav id="sidebarNav" class="flex-1 py-4 space-y-1"></nav>
            <div class="p-4 border-t border-slate-700/50">
                <div class="flex items-center gap-3 text-slate-300 text-sm">
                    <div class="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center text-white font-bold text-xs" id="userAvatar">U</div>
                    <div>
                        <p id="sidebarUserName" class="font-medium text-white text-sm">Utilisateur</p>
                        <p id="sidebarUserEmail" class="text-slate-400 text-xs">email</p>
                    </div>
                </div>
                <button id="logoutBtn" class="mt-3 w-full text-left text-slate-400 hover:text-red-400 text-xs flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1" /></svg>
                    Déconnexion
                </button>
            </div>
        </aside>

        <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <div class="main-content p-4 md:p-6 lg:p-8">
            <div class="lg:hidden flex items-center justify-between mb-6">
                <button onclick="toggleSidebar()" class="p-2 rounded-lg bg-white shadow-sm">
                    <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 class="text-lg font-bold text-slate-800" id="pageTitleMobile">Tableau de bord</h1>
                <div class="w-10"></div>
            </div>

            <!-- Views -->
            <div id="viewAdminDashboard" class="view hidden"></div>
            <div id="viewAdminUsers" class="view hidden"></div>
            <div id="viewAdminServices" class="view hidden"></div>
            <div id="viewLabTests" class="view hidden"></div>
            <div id="viewRxStatus" class="view hidden"></div>
        </div>
    </div>

    <!-- Modal overlay -->
    <div id="modalOverlay" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-4">
        <div id="modalContent" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 relative max-h-[90vh] overflow-y-auto"></div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3"></div>

    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
